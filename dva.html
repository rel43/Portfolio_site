<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interests - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: #1a1a1a;
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #d8d8d8;
            border-radius: 20px;
            padding: 40px;
            min-height: 800px;
        }

        /* Back Button */
        .back-button {
            display: inline-block;
            background: #e0e0e0;
            color: #1a1a1a;
            padding: 12px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 30px;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
        }

        .back-button:hover {
            background: #c8c8c8;
            transform: translateY(-2px);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 40px;
            clear: both;
        }

        .tab {
            padding: 12px 30px;
            background: #1a1a1a;
            color: #1a1a1a;
            border: none;
            cursor: pointer;
            font-size: 22px;
            font-weight: 400;
            transition: all 0.3s;
            border-radius: 5px 5px 0 0;
        }

        .tab.inactive {
            background: #1a1a1a;
            color: #1a1a1a;
        }

        .tab.active {
            background: #ff66b2;
            color: #1a1a1a;
            font-weight: 500;
        }

        /* Content */
        .content {
            padding: 20px 0;
        }

        .description {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 50px;
            max-width: 600px;
            text-align: right;
        }

        /* Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            margin-bottom: 50px;
        }

        .gallery-item {
            border-radius: 25px;
            overflow: hidden;
            aspect-ratio: 3/4;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Social Links */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: flex-end;
            align-items: flex-end;
        }

        .social-item {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 16px;
            transition: opacity 0.3s;
        }

        .social-item:hover {
            opacity: 0.7;
        }

        .social-icon {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .telegram {
            background: #0088cc;
        }

        .vk {
            background: #4a76a8;
        }

        .social-url {
            font-size: 16px;
            color: #1a1a1a;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }

            .description {
                text-align: left;
            }

            .social-links {
                align-items: flex-start;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .tabs {
                flex-direction: column;
                gap: 2px;
            }

            .tab {
                border-radius: 5px;
                text-align: left;
            }

            .gallery {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .back-button {
                width: 100%;
                text-align: center;
                margin-bottom: 20px;
            }
        }
    </style>
    <link rel="stylesheet" href="site-polish.css?v=20260528-2">
    <script src="site-images.js?v=20260528-2" defer></script>
    <script src="site-tabs.js?v=20260528-2" defer></script>
</head>

    <script>
        // Tab switching functionality
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => {
                    t.classList.remove('active');
                    t.classList.add('inactive');
                });
                this.classList.remove('inactive');
                this.classList.add('active');
                
                // Here you would typically load different content
                const tabName = this.textContent;
                console.log('Switched to tab:', tabName);
            });
        });

        // Gallery item click
        document.querySelectorAll('.gallery-item').forEach(item => {
            item.addEventListener('click', function() {
                // You can add lightbox or other functionality here
                console.log('Gallery item clicked');
            });
        });
    </script>
